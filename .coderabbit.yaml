language: "en-US"

reviews:
  auto_review:
    enabled: true
    drafts: false

  profile: "chill"          # constructive reviews, not too strict

  path_instructions:

    - path: "pages/**"
      instructions: |
        These are Page Object Model classes for Playwright automation in JavaScript.
        Review for:
        - All locators must be defined inside the constructor only
        - No assertions (expect) inside page objects
        - Each method must do ONE thing only
        - No hardcoded test data inside page objects
        - Constructor must accept 'page' as parameter and store as this.page

    - path: "tests/**"
      instructions: |
        These are Playwright spec files using Page Object Model in JavaScript.
        Review for:
        - Must import { test, expect } from '../fixtures/base.js' not from @playwright/test
        - Exception: setup.js imports directly from @playwright/test
        - No locators inside test files
        - No hardcoded credentials or test data inside tests
        - Each test must have a clear test case ID in the name (e.g TC_LGN_001)
        - beforeAll/beforeEach/afterAll must be used correctly

    - path: "fixtures/**"
      instructions: |
        These are Playwright custom fixtures in JavaScript.
        Review for:
        - loginPage fixture must use { browser } not { page }
        - loginPage must have storageState: undefined explicitly set
        - loginPage must have scope: 'worker'
        - All other fixtures (formPage, tablePage etc.) must use { page }
        - expect must be re-exported from base.js

    - path: "testdata/**"
      instructions: |
        These are test data files in JavaScript.
        Review for:
        - No hardcoded sensitive credentials
        - All data must be exported as constants
        - Credentials should use process.env with fallback values

chat:
  auto_reply: true